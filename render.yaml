services:
  - type: web
    name: photo-caption-contest
    env: node
    buildCommand: npm install && npx sequelize-cli db:migrate && npx sequelize-cli db:seed:all
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: photo-caption-contest-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: SESSION_MAX_AGE
        value: 86400000
      - key: CACHE_TTL
        value: 3600

databases:
  - name: photo-caption-contest-db
    databaseName: photo_caption_contest
    user: photo_caption_user
    plan: free
